server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: sda-telemetry
  lifecycle:
    timeout-per-shutdown-phase: 30s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: sda-telemetry
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.skowronski.sda.telemetry.domain"
        spring.json.value.default.type: com.skowronski.sda.telemetry.domain.TelemetryUpdate
        spring.json.use.type.headers: false
        max.poll.records: 100
        isolation.level: read_committed
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 10
    listener:
      ack-mode: manual
      missing-topics-fatal: false

sda:
  kafka:
    topics:
      telemetry: rso.telemetry
      dlq: rso.telemetry.dlq

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    kafka:
      enabled: true

logging:
  level:
    root: INFO
    com.skowronski.sda: INFO
    org.apache.kafka: WARN
