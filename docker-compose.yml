# Local stack for the SDA telemetry demo.
# Brings up: Kafka (KRaft, single broker), NiFi, the Spring Boot app, and a Prometheus scraper.

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: sda-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: q1Sh-9_ISia_zwGINzRvyQ
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic rso.telemetry --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic rso.telemetry.dlq --partitions 1 --replication-factor 1 &&
      echo 'Topics ready' && sleep 2
      "
    restart: "no"

  nifi:
    image: apache/nifi:2.0.0
    container_name: sda-nifi
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: ChangeThisPasswordPlease
      NIFI_WEB_HTTPS_PORT: 8443
      NIFI_SENSITIVE_PROPS_KEY: changeitchangeitchangeitchangeit
    volumes:
      - ./nifi/conf:/opt/nifi/nifi-current/conf-readonly:ro
      - ./nifi/data:/data
    depends_on:
      kafka:
        condition: service_healthy

  app:
    build: .
    container_name: sda-telemetry-app
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      SPRING_PROFILES_ACTIVE: json
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: sda-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app
